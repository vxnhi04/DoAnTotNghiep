<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo đợt tuyển dụng mới - KIYOKAWA CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">

<div class="flex-1 p-8 overflow-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-10">
      <button onclick="history.back()" class="text-gray-500 hover:text-gray-700 p-2">
        <i class="fas fa-arrow-left text-3xl"></i>
      </button>
      <div>
        <h1 class="text-4xl font-semibold">Tạo đợt tuyển dụng mới</h1>
        <p class="text-gray-500 mt-1">Nhập thông tin chi tiết cho đợt tuyển dụng</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm p-10">

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

        <!-- Cột trái - Thông tin chính -->
        <div class="lg:col-span-7 space-y-8">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Tên đợt tuyển dụng <span class="text-red-500">*</span>
            </label>
            <input type="text" id="campaignName" placeholder="Ví dụ: Su 10 - Xuất khẩu lao động Nhật Bản" 
                   class="w-full border border-gray-300 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-purple-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mô tả đợt</label>
            <textarea id="description" rows="5" placeholder="Mô tả ngắn gọn về mục tiêu, đối tượng và yêu cầu của đợt tuyển dụng..." 
                      class="w-full border border-gray-300 rounded-3xl px-6 py-5 focus:outline-none focus:border-purple-500"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Chương trình <span class="text-red-500">*</span>
            </label>
            <select id="programSelect" onchange="loadCountries()" 
                    class="w-full border border-gray-300 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-purple-500">
              <option value="">Chọn chương trình</option>
              <option value="0">Xuất khẩu lao động</option>
              <option value="1">Du học hệ vừa học vừa làm</option>
              <option value="2">Chương trình Kỹ sư</option>
            </select>
          </div>

          <!-- Quốc gia áp dụng -->
          <div id="countriesSection" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-3">
              Quốc gia áp dụng <span class="text-red-500">*</span>
            </label>
            <div id="countriesList" class="flex flex-wrap gap-3 max-h-60 overflow-y-auto p-2">
              <!-- JS render checkbox quốc gia -->
            </div>
          </div>

        </div>

        <!-- Cột phải - Thời gian & Trạng thái -->
        <div class="lg:col-span-5 space-y-8">

          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Ngày bắt đầu <span class="text-red-500">*</span>
              </label>
              <input type="date" id="startDate" 
                     class="w-full border border-gray-300 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-purple-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Ngày kết thúc
              </label>
              <input type="date" id="endDate" 
                     class="w-full border border-gray-300 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-purple-500">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Trạng thái đợt</label>
            <select id="status" class="w-full border border-gray-300 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-purple-500">
              <option value="">Chọn trạng thái</option>
              <option selected>Sắp diễn ra</option>
              <option>Đang diễn ra</option>
              <option>Đã kết thúc</option>
              <option>Đã hủy</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Người tạo</label>
            <input type="text" value="Quản Trị Viên" readonly 
                   class="w-full border border-gray-300 rounded-2xl px-6 py-5 bg-gray-50 text-gray-600">
          </div>

        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-4 mt-16">
        <button onclick="history.back()" 
                class="px-10 py-4 border border-gray-300 rounded-2xl text-lg hover:bg-gray-50">
          Hủy
        </button>
        <button onclick="saveCampaign()" 
                class="px-10 py-4 bg-purple-600 text-white rounded-2xl text-lg hover:bg-purple-700">
          Lưu đợt tuyển dụng
        </button>
        <button onclick="saveAndCreateNew()" 
                class="px-10 py-4 bg-white border border-purple-600 text-purple-600 rounded-2xl text-lg hover:bg-purple-50">
          Lưu &amp; Tạo đợt mới
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Dữ liệu quốc gia theo chương trình (đồng bộ với trang Quản lý quốc gia)
const countriesByProgram = {
  0: ["Nhật Bản","Hàn Quốc","Đài Loan","Singapore","Malaysia","Thái Lan","Trung Quốc","Indonesia","Philippines","Úc","New Zealand","Đức"],
  1: ["Hàn Quốc","Nhật Bản","Đài Loan","Singapore","Úc","New Zealand","Canada","Anh"],
  2: ["Nhật Bản","Đức","Hàn Quốc","Singapore","Úc","Canada"]
};

function loadCountries() {
  const programId = document.getElementById('programSelect').value;
  const container = document.getElementById('countriesList');
  const section = document.getElementById('countriesSection');

  if (!programId) {
    section.classList.add('hidden');
    return;
  }

  section.classList.remove('hidden');
  container.innerHTML = '';

  countriesByProgram[programId].forEach(country => {
    const label = document.createElement('label');
    label.className = "flex items-center gap-3 bg-gray-100 hover:bg-gray-200 px-5 py-4 rounded-2xl cursor-pointer transition text-base";
    label.innerHTML = `
      <input type="checkbox" class="accent-purple-600 w-5 h-5">
      <span>${country}</span>
    `;
    container.appendChild(label);
  });
}

function saveCampaign() {
  const name = document.getElementById('campaignName').value.trim();
  if (!name) {
    alert("Vui lòng nhập tên đợt tuyển dụng!");
    return;
  }
  alert("✅ Đợt tuyển dụng đã được tạo thành công!");
}

function saveAndCreateNew() {
  saveCampaign();
  // Reset form
  setTimeout(() => {
    document.getElementById('campaignName').value = '';
    document.getElementById('programSelect').value = '';
    document.getElementById('countriesSection').classList.add('hidden');
  }, 600);
}
</script>
</body>
</html>
