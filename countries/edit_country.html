
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa quốc gia - KIYOKAWA CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<div class="flex-1 p-8 overflow-auto">
    <div class="max-w-screen-2xl mx-auto">
      
      <div class="mb-8">
    <div class="flex items-center gap-4">
      <button onclick="history.back()" class="text-gray-500 hover:text-gray-700 transition-colors">
        <i class="fas fa-arrow-left text-2xl"></i>
      </button>
      <h1 class="text-3xl font-semibold">Chỉnh sửa quốc gia</h1>
    </div>
    <!-- Dòng mô tả xuống hàng riêng -->
    <p class="text-gray-500 mt-2 ml-12">
      Xuất khẩu lao động → Nhật Bản
    </p>

      <!-- Form được kéo dãn rộng hơn -->
      <div class="bg-white rounded-3xl shadow-sm p-10">
        <div class="max-w-3xl mx-auto space-y-8">   <!-- ← Đã thay đổi từ max-w-2xl thành max-w-3xl -->

          <!-- Loại chương trình -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Loại chương trình</label>
            <input type="text" value="Xuất khẩu lao động" readonly 
                   class="w-full border border-gray-200 bg-gray-100 rounded-2xl px-5 py-4 text-gray-500">
          </div>

          <!-- Tên quốc gia -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Tên quốc gia <span class="text-red-500">*</span>
            </label>
            <input id="countryName" type="text" value="Nhật Bản" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500 focus:ring-1">
          </div>

          <!-- Thứ tự hiển thị -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Thứ tự hiển thị</label>
            <input id="displayOrder" type="number" value="1" min="1"
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <!-- Kích hoạt -->
          <div class="flex items-center gap-3">
            <input type="checkbox" id="active" checked class="w-5 h-5 accent-purple-600 cursor-pointer">
            <label for="active" class="text-sm font-medium cursor-pointer">Kích hoạt quốc gia</label>
          </div>

          <!-- Viết tắt -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Viết tắt (Abbreviation)</label>
            
            <div id="abbrevContainer" class="flex flex-wrap gap-2 mb-4">
              <!-- JS render tag -->
            </div>

            <div class="flex gap-3">
              <input id="newAbbrev" type="text" placeholder="Nhập viết tắt mới (ví dụ: JP, JPN...)"
                     class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
              <button onclick="addAbbreviation()" 
                      class="px-8 bg-purple-600 text-white rounded-2xl hover:bg-purple-700 transition-colors whitespace-nowrap">
                <i class="fas fa-plus"></i> Thêm
              </button>
            </div>
          </div>
        </div>

        <!-- Nút hành động -->
        <div class="flex justify-end gap-4 mt-12 max-w-3xl mx-auto">
          <button onclick="history.back()" 
                  class="px-10 py-4 border border-gray-300 rounded-2xl hover:bg-gray-50 transition-colors">
            Hủy
          </button>
          <button onclick="saveCountry()" 
                  class="px-10 py-4 bg-purple-600 text-white rounded-2xl hover:bg-purple-700 transition-colors font-medium">
            Lưu thay đổi
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast thông báo -->
<div id="toast" class="hidden fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 toast">
  <i class="fas fa-check-circle text-2xl"></i>
  <span id="toastMessage" class="font-medium">Thay đổi đã được lưu thành công!</span>
</div>

<script>
// Mảng viết tắt ban đầu
let abbreviations = ["JP", "JPN"];

// Render tag viết tắt
function renderAbbreviations() {
  const container = document.getElementById('abbrevContainer');
  container.innerHTML = '';

  abbreviations.forEach((abbr, index) => {
    const tag = document.createElement('span');
    tag.className = `tag bg-blue-100 text-blue-700 px-5 py-3 rounded-2xl text-sm flex items-center gap-2`;
    tag.innerHTML = `
      ${abbr}
      <button onclick="removeAbbreviation(${index})" 
              class="ml-1 text-red-500 hover:text-red-700 text-xl leading-none">×</button>
    `;
    container.appendChild(tag);
  });
}

function addAbbreviation() {
  const input = document.getElementById('newAbbrev');
  const value = input.value.trim().toUpperCase();

  if (!value) {
    alert("Vui lòng nhập viết tắt!");
    return;
  }
  if (abbreviations.includes(value)) {
    alert("Viết tắt này đã tồn tại!");
    return;
  }

  abbreviations.push(value);
  renderAbbreviations();
  input.value = '';
}

function removeAbbreviation(index) {
  if (confirm("Bạn có chắc muốn xóa viết tắt này?")) {
    abbreviations.splice(index, 1);
    renderAbbreviations();
  }
}

function saveCountry() {
  const countryName = document.getElementById('countryName').value.trim();
  if (!countryName) {
    alert("Vui lòng nhập tên quốc gia!");
    return;
  }

  showToast(`Đã lưu thay đổi cho quốc gia: ${countryName}`);
  
  setTimeout(() => {
    history.back();
  }, 1600);
}

function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMessage').textContent = message;
  toast.classList.remove('hidden');

  setTimeout(() => {
    toast.style.transition = 'all 0.4s ease';
    toast.style.opacity = '0';
    setTimeout(() => {
      toast.classList.add('hidden');
      toast.style.opacity = '1';
    }, 400);
  }, 2500);
}

// Khởi tạo
document.addEventListener('DOMContentLoaded', () => {
  renderAbbreviations();
});
</script>

</body>
</html>
