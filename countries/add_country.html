
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm quốc gia mới - KIYOKAWA CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-8">

<div class="max-w-screen-2xl mx-auto">
  <div class="flex items-center gap-4 mb-8">
    <button onclick="history.back()" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left text-2xl"></i>
    </button>
    <h1 class="text-3xl font-semibold">Thêm quốc gia mới</h1>
  </div>

  <div class="bg-white rounded-3xl shadow-sm p-10">
    <div class="space-y-8">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Loại chương trình <span class="text-red-500">*</span></label>
        <select class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          <option value="">Chọn chương trình</option>
          <option>Xuất khẩu lao động</option>
          <option>Du học hệ vừa học vừa làm</option>
          <option>Chương trình Kỹ sư</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Tên quốc gia <span class="text-red-500">*</span></label>
        <input type="text" placeholder="Ví dụ: Nhật Bản" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Thứ tự hiển thị</label>
        <input type="number" value="1" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
      </div>

      <div class="flex items-center gap-3">
        <input type="checkbox" id="active" checked class="w-5 h-5 accent-purple-600">
        <label for="active" class="text-sm font-medium">Kích hoạt quốc gia (Hoạt động)</label>
      </div>

      <!-- Viết tắt -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-3">Viết tắt</label>
        <div class="flex gap-3">
          <input type="text" id="abbrev" placeholder="JP" 
                 class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none">
          <button onclick="addAbbrev()" 
                  class="px-6 bg-blue-100 hover:bg-gray-200 rounded-2xl">Thêm</button>
        </div>
        <div id="abbrevList" class="flex flex-wrap gap-2 mt-4"></div>
      </div>
    </div>

    <div class="flex justify-end gap-4 mt-12">
      <button onclick="history.back()" class="px-10 py-4 border border-gray-300 rounded-2xl hover:bg-gray-50">Hủy</button>
      <button onclick="alert('Quốc gia đã được thêm thành công!')" 
              class="px-10 py-4 bg-purple-600 text-white rounded-2xl hover:bg-purple-700">Lưu quốc gia</button>
    </div>
  </div>
</div>

<script>
function addAbbrev() {
  const input = document.getElementById('abbrev');
  const list = document.getElementById('abbrevList');
  if (input.value.trim() === '') return;

  const tag = document.createElement('div');
  tag.className = 'bg-blue-100 text-blue-700 px-4 py-2 rounded-2xl text-sm flex items-center gap-2';
  tag.innerHTML = `
    ${input.value.trim()}
    <button onclick="this.parentElement.remove()" class="text-blue-500 hover:text-red-500">×</button>
  `;
  list.appendChild(tag);
  input.value = '';
}
</script>

</body>
</html>
