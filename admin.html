
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Trị Viên - Thông tin tài khoản - KIYOKAWA CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-8">

<div class="max-w-screen-2xl mx-auto">
  <h1 class="text-3xl font-semibold mb-8">Quản Trị Viên</h1>

  <div class="bg-white rounded-3xl shadow-sm p-10">

    <!-- Thông tin tài khoản cá nhân -->
    <div class="flex items-center gap-6 mb-12">
      <div class="w-24 h-24 bg-purple-600 rounded-3xl flex items-center justify-center text-white text-5xl font-bold">
        Q
      </div>
      <div>
        <h2 class="text-2xl font-semibold">Quản Trị Viên</h2>
        <p class="text-gray-500">admin@gmail.com</p>
        <p class="text-emerald-600 text-sm mt-1">● Đang hoạt động</p>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-10">
      <!-- Thông tin cơ bản -->
      <div>
        <h3 class="font-semibold text-lg mb-6 border-b pb-3">Thông tin tài khoản</h3>
        
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Họ và tên</label>
            <input type="text" value="Quản Trị Viên" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email đăng nhập</label>
            <input type="email" value="admin@gmail.com" readonly 
                   class="w-full border border-gray-200 bg-gray-100 rounded-2xl px-5 py-4 text-gray-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Số điện thoại</label>
            <input type="tel" value="0332 186 877" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Vai trò</label>
            <input type="text" value="Admin (Quản lý)" readonly 
                   class="w-full border border-gray-200 bg-gray-100 rounded-2xl px-5 py-4 text-gray-500">
          </div>
        </div>
      </div>

      <!-- Đổi mật khẩu -->
      <div>
        <h3 class="font-semibold text-lg mb-6 border-b pb-3">Đổi mật khẩu</h3>
        
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu hiện tại <span class="text-red-500">*</span></label>
            <input type="password" id="currentPass" placeholder="Nhập mật khẩu hiện tại" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu mới <span class="text-red-500">*</span></label>
            <input type="password" id="newPass" placeholder="Nhập mật khẩu mới" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Xác nhận mật khẩu mới <span class="text-red-500">*</span></label>
            <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới" 
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
          </div>

          <button onclick="changePassword()" 
                  class="w-full mt-4 py-4 bg-amber-600 text-white rounded-2xl font-medium hover:bg-amber-700 transition">
            <i class="fas fa-key"></i> Đổi mật khẩu
          </button>
        </div>
      </div>
    </div>

    <!-- Nút lưu thông tin -->
    <div class="flex justify-end mt-16">
      <button onclick="saveProfile()" 
              class="px-12 py-4 bg-purple-600 text-white rounded-2xl hover:bg-purple-700">
        Lưu thông tin tài khoản
      </button>
    </div>
  </div>
</div>

<script>
function saveProfile() {
  alert("✅ Thông tin tài khoản đã được cập nhật thành công!");
}

function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newPass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;

  if (!current || !newPass || !confirm) {
    alert("Vui lòng nhập đầy đủ thông tin mật khẩu!");
    return;
  }

  if (newPass !== confirm) {
    alert("Mật khẩu mới và xác nhận mật khẩu không khớp!");
    return;
  }

  alert("✅ Đổi mật khẩu thành công!\n\nLần sau đăng nhập vui lòng dùng mật khẩu mới.");
  
  // Reset form
  document.getElementById('currentPass').value = '';
  document.getElementById('newPass').value = '';
  document.getElementById('confirmPass').value = '';
}
</script>

</body>
</html>
