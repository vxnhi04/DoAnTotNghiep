
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - KIYOKAWA CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f3e8ff 0%, #e0f2fe 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-3xl shadow-xl w-full max-w-md mx-4 overflow-hidden">
    
    <!-- Header -->
    <div class="pt-10 pb-8 px-10 text-center">
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-purple-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold shadow-lg">
          K
        </div>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Chào mừng đến với</h1>
      <h2 class="text-3xl font-bold text-gray-900 mt-1">KIYOKAWA CRM</h2>
      <p class="text-gray-500 mt-2">Đăng nhập vào hệ thống quản trị</p>
    </div>

    <div class="px-10 pb-10">
      <form onsubmit="handleLogin(event)">
        <!-- Email -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" id="email" value="admin@gmail.com" 
                 class="w-full bg-gray-100 border border-transparent focus:border-purple-500 rounded-2xl px-5 py-4 outline-none transition">
        </div>

        <!-- Mật khẩu -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
          <div class="relative">
            <input type="password" id="password" value="Abc123!@#" 
                   class="w-full bg-gray-100 border border-transparent focus:border-purple-500 rounded-2xl px-5 py-4 outline-none transition">
            <button type="button" onclick="togglePassword()" 
                    class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Ghi nhớ đăng nhập -->
        <div class="flex items-center justify-between mb-8">
          <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4 accent-purple-600">
            Ghi nhớ đăng nhập
          </label>
          <a href="#" onclick="alert('Chức năng quên mật khẩu sẽ được thêm sau')" 
             class="text-sm text-purple-600 hover:text-purple-700">Quên mật khẩu?</a>
        </div>

        <!-- Nút Đăng nhập -->
        <button type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
          Đăng nhập
        </button>
      </form>

      <!-- Footer -->
      <div class="text-center mt-10">
        <p class="text-xs text-gray-400">Powered by NinePlus</p>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordField = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordField.type = "password";
        eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email && password) {
        alert("✅ Đăng nhập thành công!\n\nChào mừng bạn đến với KIYOKAWA CRM");
        // Chuyển hướng sang trang chính (index.html)
        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);
      } else {
        alert("Vui lòng nhập đầy đủ email và mật khẩu!");
      }
    }
  </script>

</body>
</html>
